<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💞Quieres ser Mi Novia?💕</title>
    <link rel="stylesheet" href="src/styles.css">
    <link rel="stylesheet" href="src/modal.css">
    <link rel="shortcut icon" href="img/logo.png">
</head>
<body>
    <div class="contenedor">
        
        <class class="container">
            <h1 class="letra-neon">¿Quieres ser mi Novia?</h1>
            <p class="neon3">
                <span class="flicker1">♣</span>
                <span class="flicker2">♣</span>
                <span class="flicker3">♣</span>
            </p>
        </class>
        <div>
            <img src="img/imagen.png" width="30%" >
            <br>
        </div>
            <div class="btn-group">
              <button id="yesBtn" class="bn-neon open-modal" data-open="modal1">SI</button>
              <button id="noBtn">NO</button>
            </div>

              <div class="modal" id="modal1" data-animation="slideInOutLeft">
                <div class="modal-dialog">
                  <header class="modal-header">
                    <h2>💖 Sabia que dirias que si AJAJJA 💖</h2>
                    <button class="close-modal" aria-label="close modal" data-close>
                      ❌ 
                    </button>
                  </header>
                  <section class="modal-content">
                   <h3>✨ Eres alguien muy genial ✨</h3>
                         <h4>💫 Me la paso muy bien contigo y me encanta la forma en que me haces sentir.</h4>
                         <h4>🌟 Qué genial coincidir y ver a dónde nos lleva esto.</h4>
                         <h4>💕 Me gustas</h4>
                         <h4>✌️ Un detallito a mi manera para ti. 😊</h4>
                  </section>
                  <footer class="modal-footer">
                    <button type="button" class="open-modal bn-neon" data-open="modal2" style="align-items: center;">
                            💕 Continuar 💕
                    </button>
                  </footer>
                </div>
              </div>
              
              <div class="modal" id="modal2" data-animation="mixInAnimations">
                <div class="modal-dialog">
                  <header class="modal-header">
                    <h4>🙊🙊🙊🍻🍻
                    </h4>
                    <button class="close-modal" aria-label="close modal" data-close>
                        ❌  
                    </button>
                  </header>
                  <section class="modal-content">
                      <img src="img/meme.jpg" alt="">
                  </section>
  
                </div>
              </div>
    
    <br><br><br>

    <audio autoplay controls>
        <source src="media/audio.mp3" type="audio/mp3">
    </audio>
    </div>
    <div class="burbujas">
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
        <div class="burbuja"></div>
    </div>
    <script src="src/js.js"></script>
    <script src="src/modal.js"></script> 
</body>
</html>
